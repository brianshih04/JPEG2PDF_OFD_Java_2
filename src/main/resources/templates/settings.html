<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: head(~{::title})}">
<head>
    <title>設定 - JPEG2PDF_OFD_Java</title>
</head>

<body th:replace="~{layout :: body}">
    <div th:fragment="content">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">⚙️ 系統設定</h1>
        
        <form id="settings-form" class="space-y-6">
            <!-- 資料夾設定 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4 text-gray-800">📁 資料夾設定</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">輸出資料夾</label>
                        <input type="text" id="output-folder" name="outputFolder" 
                               th:value="${settings.outputFolder}"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                        <p class="text-xs text-gray-500 mt-1">PDF / OFD / TEXT 輸出位置</p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">監控資料夾</label>
                        <input type="text" id="watch-folder" name="watchFolder"
                               th:value="${settings.watchFolder}"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                        <p class="text-xs text-gray-500 mt-1">放入圖片後自動處理</p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">已處理資料夾</label>
                        <input type="text" id="save-folder" name="saveFolder"
                               th:value="${settings.saveFolder}"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                        <p class="text-xs text-gray-500 mt-1">處理完的影像存放位置</p>
                    </div>
                </div>
            </div>
            
            <!-- OCR 設定 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4 text-gray-800">🔍 OCR 設定</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">預設語言</label>
                        <select id="default-language" name="defaultLanguage"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                            <option value="chinese_cht" th:selected="${settings.defaultLanguage == 'chinese_cht'}">繁體中文</option>
                            <option value="ch" th:selected="${settings.defaultLanguage == 'ch'}">简体中文</option>
                            <option value="en" th:selected="${settings.defaultLanguage == 'en'}">English</option>
                            <option value="japan" th:selected="${settings.defaultLanguage == 'japan'}">日本語</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">OCR 引擎</label>
                        <select id="ocr-engine" name="ocrEngine"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                            <option value="paddleocr" th:selected="${settings.ocrEngine == 'paddleocr'}">PaddleOCR-Java</option>
                            <option value="tesseract" th:selected="${settings.ocrEngine == 'tesseract'}">Tesseract (未來支援)</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- 字體設定 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4 text-gray-800">🔤 字體設定</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">PDF 字體路徑</label>
                        <input type="text" id="font-path" name="fontPath"
                               th:value="${settings.fontPath}"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                        <p class="text-xs text-gray-500 mt-1">Windows: C:/Windows/Fonts/simsun.ttc</p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">OFD 字體路徑</label>
                        <input type="text" id="ofd-font-path" name="ofdFontPath"
                               th:value="${settings.ofdFontPath}"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                        <p class="text-xs text-gray-500 mt-1">字體將嵌入到 OFD 檔案中</p>
                    </div>
                </div>
            </div>
            
            <!-- 儲存按鈕 -->
            <div class="flex justify-end space-x-4">
                <button type="button" id="reset-btn"
                        class="bg-gray-600 text-white px-6 py-2 rounded-lg hover:bg-gray-700 transition-colors">
                    🔄 重設
                </button>
                <button type="submit"
                        class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    💾 儲存設定
                </button>
            </div>
        </form>
        
        <!-- 系統資訊 -->
        <div class="bg-white rounded-lg shadow-md p-6 mt-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">ℹ️ 系統資訊</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-sm text-gray-600">版本</p>
                    <p class="font-medium text-gray-800">1.0.0</p>
                </div>
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-sm text-gray-600">Java 版本</p>
                    <p class="font-medium text-gray-800" th:text="${javaVersion}">21.0.10</p>
                </div>
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-sm text-gray-600">Spring Boot</p>
                    <p class="font-medium text-gray-800">3.2.0</p>
                </div>
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-sm text-gray-600">PDF 引擎</p>
                    <p class="font-medium text-gray-800">Apache PDFBox 3.0.2</p>
                </div>
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-sm text-gray-600">OFD 引擎</p>
                    <p class="font-medium text-gray-800">ofdrw 2.0.3</p>
                </div>
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-sm text-gray-600">OCR 引擎</p>
                    <p class="font-medium text-gray-800">PaddleOCR-Java 0.0.7</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
